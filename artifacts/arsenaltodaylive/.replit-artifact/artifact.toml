kind = "web"
previewPath = "/"
title = "Arsenaltodaylive"
version = "1.0.0"
id = "artifacts/arsenaltodaylive"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19763

[services.development]
run = "pnpm --filter @workspace/arsenaltodaylive run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arsenaltodaylive", "run", "build" ]
publicDir = "artifacts/arsenaltodaylive/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19763"
BASE_PATH = "/"
